AutoName: Breeze
Summary: P2P Encrypted Messenger
Description: |-
  Peer-to-peer encrypted messenger. No phone number. No registration.
  Your identity is a cryptographic keypair stored only on your device.

  Messages travel directly between devices via WebRTC DataChannel
  with ECDH P-256 key exchange and AES-256-GCM encryption.

  When a peer is offline, messages are temporarily stored on an encrypted
  relay server and deleted immediately upon delivery.

  Also includes:
  * Dead Drop — self-destructing encrypted secret sharing
  * Ephemeral Chat — anonymous 24h auto-destructing chat rooms
  * Breeze ID — short @alias for easy contact sharing
  * Encrypted backup/restore of identity and contacts

  No tracking. No analytics. No ads. Open source (MIT).

